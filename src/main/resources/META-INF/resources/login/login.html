<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 메인 페이지</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/lol-logo.webp" alt="LOL Logo" style="height:32px; width:auto;">Navbar
            </a> -->
            <img src="../images/lol-logo.webp" alt="" width="30" height="24">Navbar
            <!-- [변경] "Navbar" 텍스트 → 다크/라이트 토글 버튼-->
            <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">
                DARK
            </button>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">뉴스</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">챔피언</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="main_page_sub/download.html">다운로드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">로그인</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            외부 웹사이트
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="https://www.leagueoflegends.com/ko-kr/">롤 공식 홈</a></li>
                            <li><a class="dropdown-item" href="https://op.gg/ko">롤 전적</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">유튜브</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
                <form class="d-flex" id="searchForm">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"
                        id="searchInput">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <!--네비바→ index.html과동일하게복사-->
    <section class="hero d-flex align-items-center
justify-content-center text-center py-5">
        <div class="container" style="max-width: 400px;">
            <h2 class="fw-bold mb-4">로그인</h2>
            <form id="loginForm" method="POST" action="/login_check">
                <div class="mb-3 text-start">
                    <label class="form-label">아이디</label>
                    <input type="text" class="form-control" id="usernameInput" name="username" placeholder="아이디 입력"
                        required>
                    <div class="invalid-feedback" id="usernameMsg"></div>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드</label>
                    <input type="password" class="form-control" id="passwordInput" name="password" placeholder="패스워드 입력"
                        required>
                    <div class="invalid-feedback" id="passwordMsg"></div>
                </div>
                <button type="button" class="btn btn-primary w-100" onclick="validateAndLogin()">로그인</button>
                <hr>
                <a href="/register" class="btn btn-outline-secondary w-100">
                    회원가입
                </a>
            </form>
        </div>
    </section>

    <!--가입확인모달(</section> 아래, </body> 위) -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">가입확인</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>아래정보로가입하시겠습니까?</p>
                    <table class="table table-dark table-bordered">
                        <tr>
                            <th>아이디</th>
                            <td id="confirmUsername"></td>
                        </tr>
                        <tr>
                            <th>이메일</th>
                            <td id="confirmEmail"></td>
                        </tr>
                        <tr>
                            <th>연락처</th>
                            <td id="confirmPhone"></td>
                        </tr>
                        <tr>
                            <th>패스워드</th>
                            <td>******** (암호화전송)</td>
                        </tr>
                    </table>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btnbtn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btnbtn-primary" onclick="submitRegister()">가입하기</button>
                </div>
            </div>
        </div>
    </div>



    <!-- 검색 javascript => 최하단에 배치! -->
    <script src="../js/search.js"></script>


    <!-- 로그인 입력값 체크 javascript -->
    <script src="../js/login.js"></script>

</body>

</html>
